<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Pádel PRO - En Vivo</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        header { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 150px; margin: 10px auto; display: block; }
        .ad-banner-container { width: 100%; max-width: 950px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border-radius: 12px; padding: 15px; text-align: center; }
        .ad-images-wrapper { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 22%; height: 80px; object-fit: contain; background: white; border-radius: 6px; }
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }
        .bracket-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .round-column { width: 100%; max-width: 400px; }
        .round-title { text-align: center; color: var(--accent); font-weight: bold; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; font-size: 1.1rem; }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; position: relative; }
        .match-id { position: absolute; top: -8px; left: -8px; background: var(--accent); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; border: 2px solid var(--bg-color); }
        .score { color: #facc15; font-weight: bold; min-width: 60px; text-align: right; }
        .match-info { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; }
        .player-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
        @media (max-width: 600px) { .ad-images-wrapper img { width: 45%; height: 70px; } }
    </style>
</head>
<body>
    <header>
        <h1 style="color:#facc15">TORNEO PÁDEL PRO</h1>
        <div style="color:var(--accent); font-weight:600">🇦🇷 Organizado por Matías Arena - Aplicacion Online Leandro Campetti 🇦🇷</div>
        <img src="logotipopng.png" class="logo-img">
    </header>
    <div class="ad-banner-container">
        <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:10px; font-weight:bold;">ACOMPAÑAN EL TORNEO</div>
        <div class="ad-images-wrapper">
            <img src="Publi-1.jpg"><img src="Publi-2.jpg"><img src="Publi-3.jpg"><img src="Publi-4.jpg">
        </div>
    </div>
    <div id="tabs-container" class="tabs"></div>
    <div id="bracket-view" class="bracket-container"></div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUND_NAMES = { 'r16': 'Octavos de Final', 'qf': 'Cuartos de Final', 'sf': 'Semifinal', 'f': 'Final' };
    let tournamentData = {};
    let currentCat = 'Primera';

    function getMatchLetter(round, index) {
        const offsets = { 'r16': 0, 'qf': 8, 'sf': 12, 'f': 14 };
        return String.fromCharCode(65 + (offsets[round] || 0) + index);
    }

    function getWinner(m) {
        if(!m) return null;
        let p1Sets=0, p2Sets=0;
        for(let i=1; i<=3; i++) {
            let s1 = parseInt(m['p1s'+i]), s2 = parseInt(m['p2s'+i]);
            if(!isNaN(s1) && !isNaN(s2)) { if(s1 > s2) p1Sets++; else if(s2 > s1) p2Sets++; }
        }
        return (p1Sets >= 2) ? m.p1 : (p2Sets >= 2) ? m.p2 : null;
    }

    function changeCat(cat) {
        currentCat = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+cat).classList.add('active');
        render();
    }

    function render() {
        const view = document.getElementById('bracket-view'); view.innerHTML = '';
        const catData = tournamentData[currentCat];
        if(!catData) return;

        ['r16','qf','sf','f'].forEach(r => {
            const col = document.createElement('div'); col.className = 'round-column';
            col.innerHTML = `<div class="round-title">${ROUND_NAMES[r]}</div>`;
            catData[r].forEach((m, i) => {
                const matchId = getMatchLetter(r, i);
                
                // Lógica de visualización para el espectador
                let dispP1 = m.p1;
                let dispP2 = m.p2;

                if(r === 'qf') {
                    dispP1 = dispP1 || 'Ganador ' + getMatchLetter('r16', i*2);
                    dispP2 = dispP2 || 'Ganador ' + getMatchLetter('r16', i*2+1);
                } else if(r === 'sf') {
                    dispP1 = dispP1 || 'Ganador ' + getMatchLetter('qf', i*2);
                    dispP2 = dispP2 || 'Ganador ' + getMatchLetter('qf', i*2+1);
                } else if(r === 'f') {
                    dispP1 = dispP1 || 'Ganador ' + getMatchLetter('sf', 0);
                    dispP2 = dispP2 || 'Ganador ' + getMatchLetter('sf', 1);
                }

                col.innerHTML += `<div class="match-card">
                    <div class="match-id">${matchId}</div>
                    <div class="match-info">Cancha: ${m.court||'-'} | 🕒 ${m.time||'-'}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="player-name">${dispP1 || 'TBD'}</span>
                        <span class="score">${m.p1s1||'-'} ${m.p1s2||'-'} ${m.p1s3||'-'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px">
                        <span class="player-name">${dispP2 || 'TBD'}</span>
                        <span class="score">${m.p2s1||'-'} ${m.p2s2||'-'} ${m.p2s3||'-'}</span>
                    </div>
                </div>`;
            });
            view.appendChild(col);
        });
    }

    const tabsContainer = document.getElementById('tabs-container');
    CATEGORIES.forEach((cat, index) => { 
        tabsContainer.innerHTML += `<button id="btn-${cat}" class="tab-btn ${index===0?'active':''}" onclick="changeCat('${cat}')">${cat}</button>`; 
    });

    db.ref('padel_torneo_pro_v2').on('value', snap => { if(snap.exists()) { tournamentData = snap.val(); render(); } });
</script>
</body>
</html>
