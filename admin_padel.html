<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - El 4to Set</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --text-main: #f8fafc; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; text-align: center; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        #admin-content { display: none; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent); margin: 10px 0; font-size: 1.8rem; }
        .logo-img { max-width: 180px; height: auto; margin: 5px auto; display: block; }
        .ad-banner-container { width: 100%; max-width: 1000px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border-radius: 12px; padding: 10px; }
        .ad-images-wrapper { display: flex; justify-content: center; align-items: center; gap: 5px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 24%; height: auto; border-radius: 4px; border: 1px solid var(--border); }
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 8px 12px; cursor: pointer; border-radius: 12px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); }
        .bracket-container { display: flex; gap: 15px; width: max-content; min-width: 100%; padding: 10px; }
        .round-column { width: 300px; display: flex; flex-direction: column; gap: 12px; }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
        .player-input { flex: 1; background: #0f172a; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 4px; font-size: 0.8rem; }
        .set-input { width: 22px; background: #0f172a; border: 1px solid var(--border); color: white; text-align: center; border-radius: 4px; margin-left: 2px; }
        @media (max-width: 800px) { .bracket-container { flex-direction: column; width: 100%; } .round-column { width: 100%; } .ad-images-wrapper img { width: 48%; } }
    </style>
</head>
<body>
<div id="login-overlay"><div class="login-box"><h2>🔒 PANEL ADMIN</h2><input type="password" id="pass-field" placeholder="Contraseña"><button onclick="checkPass()">Entrar</button></div></div>
<div id="admin-content">
    <header><h1>TORNEO DE PÁDEL</h1><img src="logotipopng.png" alt="Logo" class="logo-img"><div style="color:var(--accent); font-weight:600">Organizado por Matías Arena - Aplicación Online Leandro Campetti</div></header>
    <div class="ad-banner-container"><div class="ad-images-wrapper"><img src="Publi-1.jpg"><img src="Publi-2.png"><img src="Publi-3.jpg"><img src="Publi-4.jpg"></div></div>
    <div class="tabs" id="tabs-container"><button style="background:#ef4444; border:none; color:white; padding:8px 15px; border-radius:12px; font-weight:bold" onclick="resetAll()">Limpiar Torneo</button></div>
    <div id="sections-container"></div>
</div>
<script>
    function checkPass() { if(document.getElementById('pass-field').value === 'cuartoset') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; } }
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUNDS = ['r16', 'qf', 'sf', 'f']; const MATCHES_PER_ROUND = { 'r16': 8, 'qf': 4, 'sf': 2, 'f': 1 };
    let tournamentData = {};
    function initEmptyData() { CATEGORIES.forEach(cat => { tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] }; ROUNDS.forEach(r => { for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({ p1: '', p2: '', p1s1: '', p2s1: '', court: '' }); }); }); }
    initEmptyData();
    function saveToCloud() { db.ref('padel_torneo_pro_v2').set(tournamentData); }
    function updateField(cat, round, idx, field, val) { tournamentData[cat][round][idx][field] = val; saveToCloud(); renderCategory(cat); }
    function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById('sec-' + id).classList.add('active'); }
    const tabsContainer = document.getElementById('tabs-container');
    CATEGORIES.forEach((cat, index) => { const activeClass = index === 0 ? 'active' : ''; tabsContainer.innerHTML += `<button class="tab-btn ${activeClass}" onclick="showSection('${cat}')">${cat}</button>`; document.getElementById('sections-container').innerHTML += `<div id="sec-${cat}" class="section ${activeClass}"><div class="bracket-wrapper"><div id="bracket-${cat}" class="bracket-container"></div></div></div>`; });
    function renderCategory(cat) { const container = document.getElementById('bracket-' + cat); container.innerHTML = ''; ROUNDS.forEach(r => { const col = document.createElement('div'); col.className = 'round-column'; col.innerHTML = `<div class="round-title">${r.toUpperCase()}</div>`; tournamentData[cat][r].forEach((m, i) => { col.innerHTML += `<div class="match-card">C: <input class="set-input" value="${m.court||''}" onchange="updateField('${cat}','${r}',${i},'court',this.value)"> <div class="player-row"><input class="player-input" value="${m.p1||''}" onchange="updateField('${cat}','${r}',${i},'p1',this.value)"><input class="set-input" value="${m.p1s1||''}" onchange="updateField('${cat}','${r}',${i},'p1s1',this.value)"></div><div class="player-row"><input class="player-input" value="${m.p2||''}" onchange="updateField('${cat}','${r}',${i},'p2',this.value)"><input class="set-input" value="${m.p2s1||''}" onchange="updateField('${cat}','${r}',${i},'p2s1',this.value)"></div></div>`; }); container.appendChild(col); }); }
    db.ref('padel_torneo_pro_v2').on('value', snap => { if(snap.exists()) { const data = snap.val(); CATEGORIES.forEach(c => { if(data[c]) tournamentData[c] = data[c]; }); renderAll(); } });
    function renderAll() { CATEGORIES.forEach(cat => renderCategory(cat)); }
</script>
</body>
</html>
