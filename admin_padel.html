<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN Padel PRO - El 4to Set</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 350px; }
        #admin-content { display: none; }
        header { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 150px; margin: 10px auto; display: block; }
        .ad-banner-container { width: 100%; max-width: 950px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border-radius: 12px; padding: 15px; text-align: center; }
        .ad-images-wrapper { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 22%; height: 80px; object-fit: contain; background: white; border-radius: 6px; }
        .tabs-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px 15px; cursor: pointer; border-radius: 15px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .section { display: none; } 
        .section.active { display: block; }
        .bracket-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .round-column { width: 100%; max-width: 420px; }
        .round-title { text-align: center; color: var(--accent); font-weight: bold; padding: 10px; border-bottom: 2px solid var(--border); margin-bottom: 15px; font-size: 1.1rem; }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; position: relative; }
        .match-id { position: absolute; top: -10px; left: -10px; background: var(--accent); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; border: 2px solid var(--bg-color); }
        .player-input { width: 60%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 5px; }
        .set-input { width: 25px; background: #0f172a; border: 1px solid var(--border); color: white; text-align: center; border-radius: 5px; font-weight: bold; }
        .info-row { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
        @media (max-width: 600px) { .ad-images-wrapper img { width: 45%; height: 70px; } }
    </style>
</head>
<body>
<div id="login-overlay"><div class="login-box"><h2>🔒 PANEL ADMIN</h2><input type="password" id="pass-field" style="width:100%; padding:10px; margin:15px 0;" placeholder="Contraseña"><button onclick="checkPass()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Entrar</button></div></div>
<div id="admin-content">
    <header>
        <h1 style="color:#facc15">PANEL ADMIN - TORNEO PÁDEL PRO</h1>
        <div style="color:var(--accent); font-weight:600">🇦🇷 Organizado por Matías Arena - Aplicacion Online Leandro Campetti 🇦🇷</div>
        <img src="logotipopng.png" class="logo-img">
    </header>
    <div class="ad-banner-container">
        <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:10px; font-weight:bold;">ACOMPAÑAN EL TORNEO</div>
        <div class="ad-images-wrapper">
            <img src="Publi-1.jpg"><img src="Publi-2.jpg"><img src="Publi-3.jpg"><img src="Publi-4.jpg">
        </div>
    </div>
    <div class="tabs-wrapper">
        <div class="tabs" id="tabs-container"></div>
        <button class="btn-reset" onclick="resetAllData()">⚠️ Reiniciar Todo el Torneo ⚠️</button>
    </div>
    <div id="sections-container"></div>
</div>
<script>
    function checkPass() { if(document.getElementById('pass-field').value === 'cuartoset') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; } }
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUND_NAMES = { 'r16': 'Octavos de Final', 'qf': 'Cuartos de Final', 'sf': 'Semifinal', 'f': 'Final' };
    let tournamentData = {};

    function getMatchLetter(round, index) {
        const offsets = { 'r16': 0, 'qf': 8, 'sf': 12, 'f': 14 };
        return String.fromCharCode(65 + (offsets[round] || 0) + index);
    }

    function initStructure() {
        let freshData = {};
        CATEGORIES.forEach(cat => {
            freshData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] };
            ['r16', 'qf', 'sf', 'f'].forEach(r => {
                let count = r==='r16'?8 : r==='qf'?4 : r==='sf'?2 : 1;
                for(let i=0; i<count; i++) {
                    let m = { p1:'', p2:'', p1s1:'', p1s2:'', p1s3:'', p2s1:'', p2s2:'', p2s3:'', court:'', time:'' };
                    freshData[cat][r].push(m);
                }
            });
            // Generar placeholders iniciales (Ganador A, etc)
            for(let i=0; i<4; i++) {
                freshData[cat].qf[i].p1 = 'Ganador ' + getMatchLetter('r16', i*2);
                freshData[cat].qf[i].p2 = 'Ganador ' + getMatchLetter('r16', i*2+1);
            }
            for(let i=0; i<2; i++) {
                freshData[cat].sf[i].p1 = 'Ganador ' + getMatchLetter('qf', i*2);
                freshData[cat].sf[i].p2 = 'Ganador ' + getMatchLetter('qf', i*2+1);
            }
            freshData[cat].f[0].p1 = 'Ganador ' + getMatchLetter('sf', 0);
            freshData[cat].f[0].p2 = 'Ganador ' + getMatchLetter('sf', 1);
        });
        return freshData;
    }

    function resetAllData() {
        if(confirm("¿Deseas borrar resultados y nombres? Las fases siguientes volverán a decir 'Ganador X'.")) {
            tournamentData = initStructure();
            db.ref('padel_torneo_pro_v2').set(tournamentData);
        }
    }

    function getWinner(m) {
        let p1Sets=0, p2Sets=0;
        for(let i=1; i<=3; i++) {
            let s1 = parseInt(m['p1s'+i]), s2 = parseInt(m['p2s'+i]);
            if(!isNaN(s1) && !isNaN(s2)) { if(s1 > s2) p1Sets++; else if(s2 > s1) p2Sets++; }
        }
        if(p1Sets >= 2) return m.p1;
        if(p2Sets >= 2) return m.p2;
        return null;
    }

    function recalculateAdvancements(cat) {
        const catData = tournamentData[cat];
        for(let i=0; i<4; i++) {
            catData.qf[i].p1 = getWinner(catData.r16[i*2]) || 'Ganador ' + getMatchLetter('r16', i*2);
            catData.qf[i].p2 = getWinner(catData.r16[i*2+1]) || 'Ganador ' + getMatchLetter('r16', i*2+1);
        }
        for(let i=0; i<2; i++) {
            catData.sf[i].p1 = getWinner(catData.qf[i*2]) || 'Ganador ' + getMatchLetter('qf', i*2);
            catData.sf[i].p2 = getWinner(catData.qf[i*2+1]) || 'Ganador ' + getMatchLetter('qf', i*2+1);
        }
        catData.f[0].p1 = getWinner(catData.sf[0]) || 'Ganador ' + getMatchLetter('sf', 0);
        catData.f[0].p2 = getWinner(catData.sf[1]) || 'Ganador ' + getMatchLetter('sf', 1);
    }

    function showSection(cat) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + cat).classList.add('active');
        document.getElementById('btn-' + cat).classList.add('active');
    }

    const tabsCont = document.getElementById('tabs-container');
    const secsCont = document.getElementById('sections-container');
    CATEGORIES.forEach((cat, index) => {
        tabsCont.innerHTML += `<button id="btn-${cat}" class="tab-btn ${index===0?'active':''}" onclick="showSection('${cat}')">${cat}</button>`;
        secsCont.innerHTML += `<div id="sec-${cat}" class="section ${index===0?'active':''}"><div class="bracket-container" id="bracket-${cat}"></div></div>`;
    });

    function update(cat, round, i, field, val) { 
        tournamentData[cat][round][i][field] = val; 
        recalculateAdvancements(cat);
        db.ref('padel_torneo_pro_v2').set(tournamentData); 
    }

    function renderCategory(cat) {
        const container = document.getElementById('bracket-' + cat); if(!container) return;
        container.innerHTML = '';
        ['r16','qf','sf','f'].forEach(r => {
            const col = document.createElement('div'); col.className = 'round-column';
            col.innerHTML = `<div class="round-title">${ROUND_NAMES[r]} - Cat. ${cat}</div>`;
            tournamentData[cat][r].forEach((m, i) => {
                const matchId = getMatchLetter(r, i);
                col.innerHTML += `<div class="match-card">
                    <div class="match-id">${matchId}</div>
                    <div class="info-row">Cancha: <input class="set-input" style="width:40px" value="${m.court||''}" onchange="update('${cat}','${r}',${i},'court',this.value)"> 🕒 Hora: <input class="set-input" style="width:60px" value="${m.time||''}" onchange="update('${cat}','${r}',${i},'time',this.value)"></div>
                    <div style="margin-top:5px"><input class="player-input" value="${m.p1||''}" onchange="update('${cat}','${r}',${i},'p1',this.value)"> <input class="set-input" value="${m.p1s1||''}" onchange="update('${cat}','${r}',${i},'p1s1',this.value)"> <input class="set-input" value="${m.p1s2||''}" onchange="update('${cat}','${r}',${i},'p1s2',this.value)"> <input class="set-input" value="${m.p1s3||''}" onchange="update('${cat}','${r}',${i},'p1s3',this.value)"></div>
                    <div style="margin-top:5px"><input class="player-input" value="${m.p2||''}" onchange="update('${cat}','${r}',${i},'p2',this.value)"> <input class="set-input" value="${m.p2s1||''}" onchange="update('${cat}','${r}',${i},'p2s1',this.value)"> <input class="set-input" value="${m.p2s2||''}" onchange="update('${cat}','${r}',${i},'p2s2',this.value)"> <input class="set-input" value="${m.p2s3||''}" onchange="update('${cat}','${r}',${i},'p2s3',this.value)"></div>
                </div>`;
            }); container.appendChild(col);
        });
    }

    db.ref('padel_torneo_pro_v2').on('value', snap => { if(snap.exists()) { tournamentData = snap.val(); CATEGORIES.forEach(c => renderCategory(c)); } });
</script>
</body>
</html>
