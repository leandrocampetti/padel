<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - El 4to Set</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; text-align: center; }
        .login-box button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        #admin-content { display: none; }
        header { text-align: center; margin-bottom: 15px; }
        .main-logo { max-width: 180px; height: auto; margin-bottom: 10px; }
        .ad-banner-container { width: 100%; max-width: 1000px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border-radius: 12px; padding: 10px; box-sizing: border-box; }
        .ad-images-wrapper { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 23%; height: auto; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); object-fit: contain;}
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 8px 15px; cursor: pointer; border-radius: 15px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); }
        .btn-reset { background: #ef4444; border: 1px solid #b91c1c; color: white; padding: 8px 15px; cursor: pointer; border-radius: 15px; font-weight: bold; }
        .bracket-container { display: flex; gap: 20px; width: max-content; min-width: 100%; margin: 0 auto; }
        .round-column { width: 330px; display: flex; flex-direction: column; gap: 15px; }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .player-input { width: 70%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; }
        .set-input { width: 25px; background: #0f172a; border: 1px solid var(--border); color: white; text-align: center; border-radius: 4px; }
        @media (max-width: 800px) { .bracket-container { flex-direction: column; width: 100%; } .round-column { width: 100%; } .ad-images-wrapper img { width: 48%; } }
    </style>
</head>
<body>
<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 Acceso Panel Admin</h2>
        <input type="password" id="pass-field" placeholder="Contraseña">
        <button onclick="checkPass()">Entrar</button>
    </div>
</div>
<div id="admin-content">
    <header>
        <img src="logotipo.jpeg" alt="Logo El 4to Set" class="main-logo">
        <div class="author">Organizado por Matías Arena - Aplicación Online Leandro Campetti</div>
    </header>
    <div class="ad-banner-container">
        <div class="ad-images-wrapper">
            <img src="Publi-1.jpg" alt="P1">
            <img src="Publi-2.png" alt="P2">
            <img src="Publi-3.jpg" alt="P3">
            <img src="Publi-4.jpg" alt="P4">
        </div>
    </div>
    <div class="tabs" id="tabs-container"><button class="btn-reset" onclick="resetAll()">Limpiar Torneo</button></div>
    <div id="sections-container"></div>
</div>
<script>
    function checkPass() { if(document.getElementById('pass-field').value === 'cuartoset') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; } }
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_NODE = 'padel_torneo_pro_v2';
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUNDS = ['r16', 'qf', 'sf', 'f'];
    const MATCHES_PER_ROUND = { 'r16': 8, 'qf': 4, 'sf': 2, 'f': 1 };
    let tournamentData = {};
    function initEmptyData() { CATEGORIES.forEach(cat => { tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] }; ROUNDS.forEach(r => { for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({ p1: '', p2: '', p1s1: '', p1s2: '', p1s3: '', p2s1: '', p2s2: '', p2s3: '', court: '', time: '' }); }); }); }
    initEmptyData();
    function saveToCloud() { db.ref(DB_NODE).set(tournamentData); }
    function updateField(cat, round, idx, field, val) { tournamentData[cat][round][idx][field] = val; saveToCloud(); renderCategory(cat); }
    function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById('sec-' + id).classList.add('active'); }
    CATEGORIES.forEach((cat, idx) => { document.getElementById('tabs-container').innerHTML += `<button class="tab-btn" onclick="showSection('${cat}')">${cat}</button>`; document.getElementById('sections-container').innerHTML += `<div id="sec-${cat}" class="section"><div id="bracket-${cat}" class="bracket-container"></div></div>`; });
    db.ref(DB_NODE).on('value', snap => { if(snap.exists()) tournamentData = snap.val(); renderAll(); });
    function renderAll() { CATEGORIES.forEach(cat => renderCategory(cat)); }
    function renderCategory(cat) { const container = document.getElementById('bracket-' + cat); container.innerHTML = ''; ROUNDS.forEach(r => { const col = document.createElement('div'); col.className = 'round-column'; for(let i=0; i<MATCHES_PER_ROUND[r]; i++) { let m = tournamentData[cat][r][i]; col.innerHTML += `<div class="match-card">Cancha: <input class="set-input" value="${m.court||''}" onchange="updateField('${cat}','${r}',${i},'court',this.value)"> <input class="player-input" value="${m.p1||''}" onchange="updateField('${cat}','${r}',${i},'p1',this.value)"> <input class="set-input" value="${m.p1s1||''}" onchange="updateField('${cat}','${r}',${i},'p1s1',this.value)"></div>`; } container.appendChild(col); }); }
</script>
</body>
</html>
