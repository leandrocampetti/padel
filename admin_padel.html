<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN Padel PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 15px; }
        h1 { color: var(--accent); margin-bottom: 5px; font-size: 1.8rem;}
        .admin-h1 { color: #facc15; }
        
        /* Updated Author style */
        .author { color: var(--accent); font-size: 0.95rem; font-weight: 600; margin-top: 10px; }
        
        /* Banner Publicitario PRO Ajustado */
        .ad-banner-container { width: 100%; max-width: 950px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border: 2px solid var(--border); border-radius: 12px; text-align: center; padding: 15px; overflow: hidden; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .ad-text { color: var(--text-dim); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;}
        .ad-images-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; width: 100%;}
        .ad-images-wrapper img { max-height: 70px; width: auto; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}

        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; max-width: 1100px; margin-left: auto; margin-right: auto;}
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 8px 15px; cursor: pointer; border-radius: 15px; transition: 0.3s; font-weight: bold; font-size: 0.85rem;}
        .tab-btn.active { background: var(--accent); color: white; }
        .btn-reset { background: #ef4444; border: 1px solid #b91c1c; color: white; padding: 8px 15px; cursor: pointer; border-radius: 15px; font-weight: bold; font-size: 0.85rem; }
        
        .section { display: none; } .section.active { display: block; }
        
        .bracket-wrapper { width: 100%; overflow-x: auto; padding-bottom: 20px;}
        .bracket-container { display: flex; gap: 20px; width: max-content; min-width: 100%; margin: 0 auto; padding: 0 10px;}
        .round-column { width: 330px; display: flex; flex-direction: column; gap: 15px; justify-content: space-around; }
        .round-title { text-align: center; color: var(--accent); font-size: 1.1rem; margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 5px; font-weight: bold;}
        
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .match-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 5px;}
        .info-input { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--accent); font-size: 0.8rem; padding: 2px 5px; border-radius: 4px; width: 70px; text-align: center; transition: border-color 0.3s; }
        .info-input:focus { border-color: var(--accent); outline: none; }
        .info-input-readonly { background: transparent; border: none; color: var(--accent); font-size: 0.85rem; font-weight: bold; width: auto; text-align: right; }
        
        .player-row { display: flex; justify-content: space-between; align-items: center; gap: 5px; }
        .player-input { flex: 1; background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; transition: border-color 0.3s;}
        .player-input:focus { border-color: var(--accent); outline: none; }
        .player-input-readonly { flex: 1; background: transparent; border: none; color: white; font-size: 0.95rem; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        
        .sets-container { display: flex; gap: 3px; }
        
        /* CSS to hide the spinners (arrows) on number inputs */
        input[type="number"].set-input::-webkit-outer-spin-button,
        input[type="number"].set-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"].set-input {
            -moz-appearance: textfield; /* Firefox */
        }
        
        .set-input { width: 22px; background: #0f172a; border: 1px solid var(--border); color: white; padding: 5px 2px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 0.85rem; transition: border-color 0.3s;}
        .set-input:focus { border-color: var(--accent); outline: none; }
        .set-input-readonly { width: 22px; background: rgba(15, 23, 42, 0.5); border: 1px solid transparent; color: #facc15; font-size: 0.95rem; font-weight: bold; text-align: center; border-radius: 4px; padding: 4px 0;}
        
        .live-badge { display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; animation: pulse 2s infinite; font-size: 0.9rem;}
        .save-info { text-align: center; font-size: 0.85rem; color: #facc15; margin-bottom: 15px; background: rgba(250, 204, 21, 0.1); padding: 8px; border-radius: 8px; border: 1px solid #facc15; max-width: 700px; margin-left: auto; margin-right: auto;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>

</head>
<body>
<header>
    <h1 class="admin-h1">PANEL ADMIN - TORNEO PÁDEL PRO</h1>
    <div class="author">🇦🇷 Organizado por Matías Arena - Aplicacion Online Leandro Campetti 🇦🇷</div>
</header>


<div class="ad-banner-container">
    <div class="ad-text">Acompañan el Torneo</div>
    <div class="ad-images-wrapper">
        <img src="peugeot.jpg" alt="Sponsor Peugeot">
        <img src="naldo-1.jpg" alt="Sponsor Naldo">
        <img src="1114.png" alt="Sponsor 1114">
    </div>
</div>


<div class="save-info">☁️ Conectado a Firebase (Versión 2): Escribe de corrido (el campo tiene borde verde al hacer click). Los datos se guardan al hacer clic afuera de la casilla (ONCHANGE).</div>

<div class="tabs" id="tabs-container">
    <button class="btn-reset" onclick="resetAll()">Limpiar Torneo Completo</button>
</div>

<div id="sections-container"></div>

<script>
    
    const firebaseConfig = {
      apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY",
      authDomain: "proyecto-mundial-2026.firebaseapp.com",
      databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com",
      projectId: "proyecto-mundial-2026",
      storageBucket: "proyecto-mundial-2026.firebasestorage.app",
      messagingSenderId: "774794097290",
      appId: "1:774794097290:web:91ff18d99e7e07a6873373"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUNDS = ['r16', 'qf', 'sf', 'f'];
    const MATCHES_PER_ROUND = { 'r16': 8, 'qf': 4, 'sf': 2, 'f': 1 };
    
    const DB_NODE = 'padel_torneo_pro_v2'; 

    let tournamentData = {};
    CATEGORIES.forEach(cat => {
        tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] };
        ROUNDS.forEach(r => {
            for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({});
        });
    });

    function saveToCloud() {
        db.ref(DB_NODE).set(tournamentData).catch(err => alert("Error: " + err.message));
    }

    function resetAll() {
        if(confirm("¿Seguro que quieres borrar TODOS los datos del torneo PRO de Padel?")) {
            CATEGORIES.forEach(cat => {
                tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] };
                ROUNDS.forEach(r => {
                    for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({});
                });
            });
            saveToCloud();
            renderAll();
        }
    }

    function updateField(cat, round, matchIdx, field, value) {
        if (!tournamentData[cat]) return;
        if (!tournamentData[cat][round][matchIdx]) tournamentData[cat][round][matchIdx] = {};
        tournamentData[cat][round][matchIdx][field] = value;
        
        recalculateAdvancements(cat);
        saveToCloud();
        renderCategory(cat);
    }

    function getWinner(match) {
        let p1Sets = 0; let p2Sets = 0;
        for(let i=1; i<=3; i++) {
            let s1 = parseInt(match['p1s'+i]);
            let s2 = parseInt(match['p2s'+i]);
            if (!isNaN(s1) && !isNaN(s2)) {
                if (s1 > s2) p1Sets++;
                else if (s2 > s1) p2Sets++;
            }
        }
        if (p1Sets >= 2) return match.p1;
        if (p2Sets >= 2) return match.p2;
        return null;
    }

    function recalculateAdvancements(cat) {
        for (let i = 0; i < 4; i++) {
            let m1 = tournamentData[cat]['r16'][i*2] || {};
            let m2 = tournamentData[cat]['r16'][i*2+1] || {};
            if(!tournamentData[cat]['qf'][i]) tournamentData[cat]['qf'][i] = {};
            tournamentData[cat]['qf'][i].p1 = getWinner(m1) || "Ganador Llave " + (i*2+1);
            tournamentData[cat]['qf'][i].p2 = getWinner(m2) || "Ganador Llave " + (i*2+2);
        }
        for (let i = 0; i < 2; i++) {
            let m1 = tournamentData[cat]['qf'][i*2] || {};
            let m2 = tournamentData[cat]['qf'][i*2+1] || {};
            if(!tournamentData[cat]['sf'][i]) tournamentData[cat]['sf'][i] = {};
            tournamentData[cat]['sf'][i].p1 = getWinner(m1) || "Ganador QF " + (i*2+1);
            tournamentData[cat]['sf'][i].p2 = getWinner(m2) || "Ganador QF " + (i*2+2);
        }
        let sf1 = tournamentData[cat]['sf'][0] || {};
        let sf2 = tournamentData[cat]['sf'][1] || {};
        if(!tournamentData[cat]['f'][0]) tournamentData[cat]['f'][0] = {};
        tournamentData[cat]['f'][0].p1 = getWinner(sf1) || "Ganador SF 1";
        tournamentData[cat]['f'][0].p2 = getWinner(sf2) || "Ganador SF 2";
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }


    const tabsContainer = document.getElementById('tabs-container');
    const sectionsContainer = document.getElementById('sections-container');
    
    CATEGORIES.forEach((cat, index) => {
        let activeClass = index === 0 ? 'active' : '';
        tabsContainer.innerHTML += `<button id="btn-${cat}" class="tab-btn ${activeClass}" onclick="showSection('${cat}')">${cat}</button>`;
        sectionsContainer.innerHTML += `<div id="sec-${cat}" class="section ${activeClass}"><div class="bracket-wrapper"><div id="bracket-${cat}" class="bracket-container"></div></div></div>`;
    });

    function renderAll() {
        CATEGORIES.forEach(cat => renderCategory(cat));
    }

    function renderCategory(cat) {
        const container = document.getElementById('bracket-' + cat);
        container.innerHTML = '';
        
        const roundNames = {'r16': 'Octavos de Final', 'qf': 'Cuartos de Final', 'sf': 'Semifinales', 'f': 'Final'};
        ROUNDS.forEach(round => {
            const col = document.createElement('div');
            col.className = 'round-column';
            col.innerHTML = `<div class="round-title">${roundNames[round]}</div>`;
            
            for(let i=0; i < MATCHES_PER_ROUND[round]; i++) {
                let match = tournamentData[cat][round][i] || {};
                let readonlyP1 = (round !== 'r16' && match.p1 && match.p1.includes('Ganador')) ? 'readonly style="color:#64748b"' : '';
                let readonlyP2 = (round !== 'r16' && match.p2 && match.p2.includes('Ganador')) ? 'readonly style="color:#64748b"' : '';
                
                // Using ONCHANGE
                col.innerHTML += `
                    <div class="match-card">
                        <div class="match-header">
                            <div>Cancha: <input type="text" class="info-input" value="${match.court || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'court', this.value)"></div>
                            <div>🕒 <input type="text" class="info-input" value="${match.time || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'time', this.value)"></div>
                        </div>
                        <div class="player-row">
                            <input type="text" class="player-input" placeholder="Pareja 1" value="${match.p1 || ''}" ${readonlyP1} onchange="updateField('${cat}', '${round}', ${i}, 'p1', this.value)">
                            <div class="sets-container">
                                <input type="number" class="set-input" placeholder="-" value="${match.p1s1 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p1s1', this.value)">
                                <input type="number" class="set-input" placeholder="-" value="${match.p1s2 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p1s2', this.value)">
                                <input type="number" class="set-input" placeholder="-" value="${match.p1s3 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p1s3', this.value)">
                            </div>
                        </div>
                        <div class="player-row">
                            <input type="text" class="player-input" placeholder="Pareja 2" value="${match.p2 || ''}" ${readonlyP2} onchange="updateField('${cat}', '${round}', ${i}, 'p2', this.value)">
                            <div class="sets-container">
                                <input type="number" class="set-input" placeholder="-" value="${match.p2s1 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p2s1', this.value)">
                                <input type="number" class="set-input" placeholder="-" value="${match.p2s2 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p2s2', this.value)">
                                <input type="number" class="set-input" placeholder="-" value="${match.p2s3 || ''}" onchange="updateField('${cat}', '${round}', ${i}, 'p2s3', this.value)">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.appendChild(col);
        });
    }

    db.ref(DB_NODE).once('value').then((snapshot) => {
        if(snapshot.exists()) { tournamentData = snapshot.val(); }
        CATEGORIES.forEach(cat => recalculateAdvancements(cat));
        renderAll();
    });

</script>
</body>
</html>
