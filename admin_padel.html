<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN Padel PRO - El 4to Set</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --accent-hover: #059669; --text-main: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 350px; }
        #admin-content { display: none; }
        header { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 150px; height: auto; margin: 10px auto; display: block; }
        .ad-banner-container { width: 100%; max-width: 950px; margin: 0 auto 20px; background: rgba(51, 65, 85, 0.3); border-radius: 12px; padding: 15px; text-align: center; }
        .ad-images-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 22%; height: 80px; object-fit: contain; background: white; border-radius: 6px; }
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 8px 15px; cursor: pointer; border-radius: 15px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); }
        .bracket-container { display: flex; gap: 20px; width: max-content; min-width: 100%; padding: 10px; }
        .round-column { width: 330px; display: flex; flex-direction: column; gap: 15px; }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .player-input { width: 65%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; }
        .set-input { width: 22px; background: #0f172a; border: 1px solid var(--border); color: white; text-align: center; border-radius: 4px; font-weight: bold; }
        @media (max-width: 800px) { .bracket-container { flex-direction: column; width: 100%; } .round-column { width: 100%; } .ad-images-wrapper img { width: 45%; height: 70px; } }
    </style>
</head>
<body>
<div id="login-overlay"><div class="login-box"><h2>🔒 PANEL ADMIN</h2><input type="password" id="pass-field" style="width:100%; padding:10px; margin:15px 0;" placeholder="Contraseña"><button onclick="checkPass()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Entrar</button></div></div>
<div id="admin-content">
    <header>
        <h1 style="color:#facc15">PANEL ADMIN - TORNEO PÁDEL PRO</h1>
        <div style="color:var(--accent); font-weight:600">🇦🇷 Organizado por Matías Arena - Aplicacion Online Leandro Campetti 🇦🇷</div>
        <img src="logotipopng.png" class="logo-img">
    </header>
    <div class="ad-banner-container">
        <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:10px; font-weight:bold;">ACOMPAÑAN EL TORNEO</div>
        <div class="ad-images-wrapper">
            <img src="Publi-1.jpg"><img src="Publi-2.jpg"><img src="Publi-3.jpg"><img src="Publi-4.jpg">
        </div>
    </div>
    <div class="tabs" id="tabs-container"><button style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:15px; cursor:pointer; font-weight:bold;" onclick="resetAll()">Limpiar Torneo</button></div>
    <div id="sections-container"></div>
</div>
<script>
    function checkPass() { if(document.getElementById('pass-field').value === 'cuartoset') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; } }
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUNDS = ['r16', 'qf', 'sf', 'f']; const MATCHES_PER_ROUND = { 'r16': 8, 'qf': 4, 'sf': 2, 'f': 1 };
    let tournamentData = {};
    function initEmptyData() { CATEGORIES.forEach(cat => { tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] }; ROUNDS.forEach(r => { for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({ p1: '', p2: '', p1s1: '', p1s2: '', p1s3: '', p2s1: '', p2s2: '', p2s3: '', court: '', time: '' }); }); }); }
    initEmptyData();
    function saveToCloud() { db.ref('padel_torneo_pro_v2').set(tournamentData); }
    function updateField(cat, round, i, field, val) { tournamentData[cat][round][i][field] = val; recalculateAdvancements(cat); saveToCloud(); renderCategory(cat); }
    function getWinner(m) { let p1=0, p2=0; for(let i=1; i<=3; i++) { let s1=parseInt(m['p1s'+i]), s2=parseInt(m['p2s'+i]); if(!isNaN(s1)&&!isNaN(s2)) { if(s1>s2) p1++; else if(s2>s1) p2++; } } return p1>=2?m.p1:(p2>=2?m.p2:null); }
    function recalculateAdvancements(cat) { for(let i=0; i<4; i++) { tournamentData[cat].qf[i].p1 = getWinner(tournamentData[cat].r16[i*2])||'Ganador R16'; tournamentData[cat].qf[i].p2 = getWinner(tournamentData[cat].r16[i*2+1])||'Ganador R16'; } for(let i=0; i<2; i++) { tournamentData[cat].sf[i].p1 = getWinner(tournamentData[cat].qf[i*2])||'Ganador QF'; tournamentData[cat].sf[i].p2 = getWinner(tournamentData[cat].qf[i*2+1])||'Ganador QF'; } tournamentData[cat].f[0].p1 = getWinner(tournamentData[cat].sf[0])||'Ganador SF'; tournamentData[cat].f[0].p2 = getWinner(tournamentData[cat].sf[1])||'Ganador SF'; }
    const tabsContainer = document.getElementById('tabs-container'); CATEGORIES.forEach((cat, index) => { let activeClass = index === 0 ? 'active' : ''; tabsContainer.innerHTML += `<button id="btn-${cat}" class="tab-btn ${activeClass}" onclick="showSection('${cat}')">${cat}</button>`; document.getElementById('sections-container').innerHTML += `<div id="sec-${cat}" class="section ${activeClass}"><div class="bracket-container" id="bracket-${cat}"></div></div>`; });
    function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('sec-' + id).classList.add('active'); document.getElementById('btn-' + id).classList.add('active'); }
    function renderCategory(cat) { const container = document.getElementById('bracket-' + cat); container.innerHTML = ''; ROUNDS.forEach(r => { const col = document.createElement('div'); col.className = 'round-column'; col.innerHTML = `<h3 style="text-align:center; color:var(--accent)">${r.toUpperCase()}</h3>`; tournamentData[cat][r].forEach((m, i) => { col.innerHTML += `<div class="match-card">Cancha: <input class="set-input" style="width:50px" value="${m.court||''}" onchange="updateField('${cat}','${r}',${i},'court',this.value)"> 🕒 <input class="set-input" style="width:50px" value="${m.time||''}" onchange="updateField('${cat}','${r}',${i},'time',this.value)"><div style="margin-top:10px"><input class="player-input" value="${m.p1||''}" onchange="updateField('${cat}','${r}',${i},'p1',this.value)"> <input class="set-input" value="${m.p1s1||''}" onchange="updateField('${cat}','${r}',${i},'p1s1',this.value)"> <input class="set-input" value="${m.p1s2||''}" onchange="updateField('${cat}','${r}',${i},'p1s2',this.value)"> <input class="set-input" value="${m.p1s3||''}" onchange="updateField('${cat}','${r}',${i},'p1s3',this.value)"></div><div style="margin-top:5px"><input class="player-input" value="${m.p2||''}" onchange="updateField('${cat}','${r}',${i},'p2',this.value)"> <input class="set-input" value="${m.p2s1||''}" onchange="updateField('${cat}','${r}',${i},'p2s1',this.value)"> <input class="set-input" value="${m.p2s2||''}" onchange="updateField('${cat}','${r}',${i},'p2s2',this.value)"> <input class="set-input" value="${m.p2s3||''}" onchange="updateField('${cat}','${r}',${i},'p2s3',this.value)"></div></div>`; }); container.appendChild(col); }); }
    db.ref('padel_torneo_pro_v2').on('value', snap => { if(snap.exists()) { tournamentData = snap.val(); CATEGORIES.forEach(c => renderCategory(c)); } });
    function resetAll() { if(confirm("¿Limpiar todo?")) { initEmptyData(); saveToCloud(); } }
</script>
</body>
</html>
