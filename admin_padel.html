<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN Padel PRO - El 4to Set</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent: #10b981; --text-main: #f8fafc; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 350px; }
        #admin-content { display: none; }
        header { text-align: center; margin-bottom: 15px; }
        .logo-img { max-width: 130px; margin: 5px auto; display: block; }
        .ad-banner-container { width: 100%; max-width: 900px; margin: 0 auto 20px; background: rgba(51,65,85,0.3); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .ad-images-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .ad-images-wrapper img { width: 22%; height: 80px; object-fit: contain; background: white; border-radius: 6px; }
        .tabs { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .tab-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); }
        .match-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .set-box { width: 30px; height: 30px; background: #0f172a; color: white; border: 1px solid var(--border); text-align: center; border-radius: 5px; font-weight: bold; }
        .player-input { width: 60%; background: #0f172a; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
<div id="login-overlay"><div class="login-box"><h2>🔒 PANEL ADMIN</h2><input type="password" id="pass-field" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Contraseña"><button onclick="checkPass()" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; font-weight:bold; cursor:pointer">Entrar</button></div></div>
<div id="admin-content">
    <header>
        <h1 style="color:#facc15">PANEL ADMIN - TORNEO PÁDEL PRO</h1>
        <div style="color:var(--accent); font-weight:bold">🇦🇷 Organizado por Matías Arena - Aplicacion Online Leandro Campetti 🇦🇷</div>
        <img src="logotipopng.png" class="logo-img">
    </header>
    <div class="ad-banner-container">
        <div style="text-align:center; color:var(--accent); font-size:0.8rem; margin-bottom:10px">ACOMPAÑAN EL TORNEO</div>
        <div class="ad-images-wrapper">
            <img src="Publi-1.jpg"><img src="Publi-2.jpg"><img src="Publi-3.jpg"><img src="Publi-4.jpg">
        </div>
    </div>
    <div class="tabs" id="tabs-container"><button style="background:#ef4444; color:white; border:none; padding:10px; border-radius:10px; font-weight:bold" onclick="resetAll()">Limpiar Torneo Completo</button></div>
    <div id="sections-container"></div>
</div>
<script>
    function checkPass() { if(document.getElementById('pass-field').value === 'cuartoset') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; } }
    const firebaseConfig = { apiKey: "AIzaSyDwSOR6VxlrLlfEoab9Zi0GjbeFtrQiVjY", authDomain: "proyecto-mundial-2026.firebaseapp.com", databaseURL: "https://proyecto-mundial-2026-default-rtdb.firebaseio.com", projectId: "proyecto-mundial-2026", storageBucket: "proyecto-mundial-2026.firebasestorage.app", messagingSenderId: "774794097290", appId: "1:774794097290:web:91ff18d99e7e07a6873373" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const CATEGORIES = ['Primera', 'Segunda', 'Tercera', 'Cuarta', 'Quinta', 'Sexta', 'Séptima', 'Octava'];
    const ROUNDS = ['r16', 'qf', 'sf', 'f']; const MATCHES_PER_ROUND = { 'r16': 8, 'qf': 4, 'sf': 2, 'f': 1 };
    let tournamentData = {};
    function initEmptyData() { CATEGORIES.forEach(cat => { tournamentData[cat] = { 'r16': [], 'qf': [], 'sf': [], 'f': [] }; ROUNDS.forEach(r => { for(let i=0; i<MATCHES_PER_ROUND[r]; i++) tournamentData[cat][r].push({ p1: '', p2: '', p1s1: '', p1s2: '', p1s3: '', p2s1: '', p2s2: '', p2s3: '', court: '', time: '' }); }); }); }
    function save() { db.ref('padel_torneo_pro_v2').set(tournamentData); }
    function update(cat, round, idx, field, val) { tournamentData[cat][round][idx][field] = val; save(); }
    // Renderizado con 3 sets y horario tal cual la Foto 1
    function renderCategory(cat) { const container = document.getElementById('bracket-' + cat); container.innerHTML = ''; ROUNDS.forEach(r => { const col = document.createElement('div'); col.className = 'round-column'; col.innerHTML = `<h3 style="text-align:center; color:var(--accent)">${r.toUpperCase()}</h3>`; tournamentData[cat][r].forEach((m, i) => { col.innerHTML += `<div class="match-card">Cancha: <input class="set-box" style="width:60px" value="${m.court||''}" onchange="update('${cat}','${r}',${i},'court',this.value)"> 🕒 <input class="set-box" style="width:60px" value="${m.time||''}" onchange="update('${cat}','${r}',${i},'time',this.value)"><div style="margin-top:10px"><input class="player-input" value="${m.p1||''}" onchange="update('${cat}','${r}',${i},'p1',this.value)"> <input class="set-box" value="${m.p1s1||''}" onchange="update('${cat}','${r}',${i},'p1s1',this.value)"> <input class="set-box" value="${m.p1s2||''}" onchange="update('${cat}','${r}',${i},'p1s2',this.value)"> <input class="set-box" value="${m.p1s3||''}" onchange="update('${cat}','${r}',${i},'p1s3',this.value)"></div><div style="margin-top:5px"><input class="player-input" value="${m.p2||''}" onchange="update('${cat}','${r}',${i},'p2',this.value)"> <input class="set-box" value="${m.p2s1||''}" onchange="update('${cat}','${r}',${i},'p2s1',this.value)"> <input class="set-box" value="${m.p2s2||''}" onchange="update('${cat}','${r}',${i},'p2s2',this.value)"> <input class="set-box" value="${m.p2s3||''}" onchange="update('${cat}','${r}',${i},'p2s3',this.value)"></div></div>`; }); container.appendChild(col); }); }
    db.ref('padel_torneo_pro_v2').on('value', snap => { if(snap.exists()) { tournamentData = snap.val(); CATEGORIES.forEach(c => renderCategory(c)); } else { initEmptyData(); save(); } });
</script>
</body>
</html>
